<section class="py-6 overflow-hidden relative w-full bg-transparent z-10">

    <div class="absolute inset-0 z-20 pointer-events-none" style="mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);">
    </div>

    <div class="flex w-full hover:pause-animation">

        <div class="flex animate-scroll whitespace-nowrap items-center">
            <div *ngFor="let tech of technologies"
                class="mx-20 flex items-center gap-4 select-none group opacity-80 hover:opacity-100 transition-opacity duration-300">

                <img [src]="tech.icon" [alt]="tech.name"
                    class="w-16 h-16 object-contain filter grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-300 transform">

                <span
                    class="hidden md:block text-3xl font-black tracking-wide text-gray-200 group-hover:text-white transition-colors">
                    {{ tech.name }}
                </span>
            </div>
        </div>

        <div class="flex animate-scroll whitespace-nowrap items-center" aria-hidden="true">
            <div *ngFor="let tech of technologies"
                class="mx-20 flex items-center gap-4 select-none group opacity-80 hover:opacity-100 transition-opacity duration-300">

                <img [src]="tech.icon" [alt]="tech.name"
                    class="w-16 h-16 object-contain filter grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-300 transform">

                <span
                    class="hidden md:block text-3xl font-black tracking-wide text-gray-200 group-hover:text-white transition-colors">
                    {{ tech.name }}
                </span>
            </div>
        </div>

    </div>
</section>
